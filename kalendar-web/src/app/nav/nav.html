<header class="nav-wrapper">
  <div class="container nav-inner">
    <a routerLink="/" class="brand">
      <span class="logo-mark">K</span>
      <span class="logo-text">Kalendar</span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/businesses" routerLinkActive="active">Browse</a>
      <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      }
    </nav>

    <div class="nav-actions">
      @if (auth.isLoggedIn()) {
        <span class="user-pill">{{ auth.currentUser()?.fullName }}</span>
        <button type="button" class="link-btn" (click)="logout()">Log out</button>
      } @else {
        <a class="link-btn" routerLink="/login">Log in</a>
        <a routerLink="/register" class="btn-cta">Get started</a>
      }
    </div>

    <button
      type="button"
      class="nav-hamburger"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle navigation"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  @if (menuOpen()) {
    <div class="nav-mobile-panel">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="m-link">Home</a>
      <a routerLink="/businesses" routerLinkActive="active" class="m-link">Browse</a>
      <a routerLink="/pricing" routerLinkActive="active" class="m-link">Pricing</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/dashboard" routerLinkActive="active" class="m-link">Dashboard</a>
        <button type="button" class="m-link m-link-button" (click)="logout()">Log out</button>
      } @else {
        <a routerLink="/login" class="m-link">Log in</a>
        <a routerLink="/register" class="m-cta">Get started</a>
      }
    </div>
    <div class="nav-mobile-backdrop" (click)="closeMenu()"></div>
  }
</header>
