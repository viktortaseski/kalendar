<section class="auth-page">
  <div class="auth-card">
    <header class="auth-head">
      <a routerLink="/" class="logo-mark" aria-label="Home">K</a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to manage your bookings.</p>
    </header>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <label class="field">
        <span class="field-label">Email</span>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          [class.invalid]="form.controls.email.touched && form.controls.email.invalid"
        />
        @if (form.controls.email.touched && form.controls.email.errors; as errs) {
          <span class="field-error">
            @if (errs['required']) { Email is required }
            @else if (errs['email']) { Enter a valid email }
          </span>
        }
      </label>

      <label class="field">
        <span class="field-label">
          Password
          <a class="forgot-link" href="#">Forgot?</a>
        </span>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        @if (form.controls.password.touched && form.controls.password.errors; as errs) {
          <span class="field-error">
            @if (errs['required']) { Password is required }
            @else if (errs['minlength']) { At least 8 characters }
          </span>
        }
      </label>

      @if (errorMessage()) {
        <div class="form-error">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn-submit" [disabled]="submitting()">
        {{ submitting() ? 'Signing in…' : 'Log in' }}
      </button>
    </form>

    <footer class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </footer>
  </div>
</section>
